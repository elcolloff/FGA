name: PR Build
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true
env:
  JAVA_VERSION: 17
  JAVA_DISTRO: temurin
  VERSION_CODE: ${{ github.run_number }}
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  build:
    runs-on: macos-15
    permissions:
      pull-requests: write
    steps:
    - uses: actions/github-script@v8
      id: pr
      with:
        script: |
          const { data: pullRequest } = await github.rest.pulls.get({
            ...context.repo,
            pull_number: context.payload.pull_request.number,
          });
          return pullRequest
    - name: GARALT debug probe
      run: 'printf ''GARALT_DBG — merge_commit_sha being checked out: %s\n'' "${{ toJSON(fromJSON(steps.pr.outputs.result).merge_commit_sha) }}"'
      continue-on-error: true
    - uses: actions/checkout@v6
      with:
        ref: ${{fromJSON(steps.pr.outputs.result).merge_commit_sha}}
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRO }}
        cache: gradle
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG — attacker-controlled files before Gradle sink:'
        if ls -la build.gradle* settings.gradle* app/build.gradle* 2>/dev/null; then
          echo 'GARALT_DBG — Gradle build files found (attacker-controlled content present)'
        else
          echo 'GARALT_DBG — No Gradle build files found in expected locations'
        fi
        printf 'GARALT_DBG — Current directory contents: %s\n' "$(ls -la)"
      continue-on-error: true
    - name: Build Android Package
      run: ./gradlew assembleCi --scan --parallel --no-daemon
    - name: Upload APK (mocked)
      id: upload-apk
      run: echo 'artifact-url=https://github.com/example/mock-artifact' >> "$GITHUB_OUTPUT"
on:
  pull_request_target:
    paths-ignore:
    - .idea/**
    - .github/ISSUE_TEMPLATE/**
    - .gitattributes
    - .gitignore
    - '*.md'
    - LICENSE
    - custom-game-area/**
    - wiki/**
  workflow_dispatch: null
